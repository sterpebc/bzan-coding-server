# Full replacement content for /etc/nginx/conf.d/default.conf, adding a
# reverse-proxy location for the Coding Server app at /coding-server/,
# alongside the existing stock nginx placeholder content (left untouched).
#
# --- Why this replaces the whole file instead of just adding a snippet ---
# nginx.conf already does `include conf.d/*.conf;` at the top level, so any
# extra file dropped into conf.d/ gets parsed there too -- and a bare
# `location` block outside a `server {}` block is invalid at that level.
# There's no clean way to inject a location into default.conf's existing
# server block from a separate file without hitting that, so the two new
# location blocks below are added directly into default.conf itself.
#
# --- Install ---
#   sudo vi /etc/nginx/conf.d/default.conf
#   (select-all, delete, paste this file's content in, save)
#   sudo systemctl reload nginx
#
# There's no `nginx -t` available via sudo on this box, so if the reload
# fails, check what went wrong with:
#   sudo systemctl status nginx
#   sudo journalctl -xe
#
# --- Changing the path ---
# To use something other than /coding-server/, replace every occurrence
# of "/coding-server" below (the two `location` lines and the
# `X-Script-Name` header) with your new path. They must match exactly,
# including no trailing slash on the X-Script-Name value.

server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # --- Coding Server app ---

    # Redirect requests missing the trailing slash (e.g. someone visits
    # /coding-server with no slash) so they still land on the app instead
    # of falling through to the / location above.
    location = /coding-server {
        return 301 /coding-server/;
    }

    location /coding-server/ {
        proxy_pass http://127.0.0.1:8080/;

        # $http_host, NOT $host: nginx's $host variable silently strips the
        # port from the Host header, so the backend app would build
        # redirect/next-page URLs missing the port whenever this is
        # accessed via a non-default port (e.g. through an SSH tunnel for
        # testing). $http_host preserves the Host header exactly as the
        # client sent it. Harmless either way on the real port-80 URL
        # students use, but $http_host is correct in both cases.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tells app.py's ReverseProxied WSGI middleware what prefix nginx
        # stripped, so Flask's url_for()/redirect() generate URLs that
        # still include /coding-server -- without this, a post-login
        # redirect would send the browser to "/" instead and miss the
        # app entirely.
        proxy_set_header X-Script-Name /coding-server;
    }
}
