<nav>
  <form action="{{ url_for('table_query', dataset_name=dataset_name, table=table) }}" method="get">
    <input name="ordering" type="hidden" value="{% if ordering %}{{ ordering }}{% endif %}" />
    <input name="sql" type="hidden" value="{{ sql|default('') }}" />
    <ul class="pagination">
      <li class="{% if page < 2 %}disabled {% endif %}page-item">
        <button class="page-link" name="page" type="submit" value="1">&laquo;</button>
      </li>
      <li class="{% if page < 2 %}disabled {% endif %}page-item">
        <button class="page-link" name="page" type="submit" value="{{ page_prev }}">&lsaquo;</button>
      </li>
      <li class="page-item disabled">
        <span class="page-link">Page {{ page }} of {{ total_pages }}</span>
      </li>
      <li class="{% if page >= total_pages %}disabled {% endif %}page-item">
        <button class="page-link" name="page" type="submit" value="{{ page_next }}">&rsaquo;</button>
      </li>
      <li class="{% if page >= total_pages %}disabled {% endif %}page-item">
        <button class="page-link" name="page" type="submit" value="{{ total_pages }}">&raquo;</button>
      </li>
    </ul>
  </form>
</nav>
